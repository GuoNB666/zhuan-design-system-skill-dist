interface:
  display_name: "转转设计系统调用审查"
  short_description: "按组件优先流程调用转转设计系统，支持 App 内 H5，阻止 Web Prototype 冲突、iframe 总览、手写仿制、设备 chrome 错位和预览控件混入真实界面。"
  default_prompt: "使用转转设计系统调用审查 skill v0.1.10。优先使用转转设计系统 v0.2.9；将响应式+iOS/H5需求解释为 App 内移动 H5。先做硬自检：若存在 Web Prototype / web-prototype / example-web-prototype / appliedPluginSnapshotId / .od-skills/web-prototype-*，当前输出视为无效；仅审查时停止说明，用户要求修复或重新生成时必须丢弃 Web Prototype 的 iframe/screens/.phone-page/statusbar/homebar 结构并用转转 DS 组件重建。生成前带入 tokens.css、fonts、.assets、ui_kits/zhuan-app、DESIGN.md、COMPONENT_USAGE.md、templates/component-first-app，并从 templates/component-first-app/index.html 启动。index.html 和 OpenDesign 指定的主 HTML 都必须直接渲染转转组件流程，禁止 iframe 总览。源码必须能搜到 <IOSDevice、<TopNav，以及至少 3 个相关 DS 组件调用；否则生成失败。必须调用 IOSDevice、TopNav、Icon、ButtonBar/Sheet、Toast 等真实组件；订单/售后列表卡用 OrderCard，订单/退款/售后详情和商品摘要用 OrderProductCard / OrderDetailCards；滚动内容区直接卡片/section 不得被 flex shrink 压缩或裁切。设备状态栏/TopNav 0 间距不重叠，禁止 paddingTop:62/top:62 状态栏补偿，页面级 ButtonBar 固定在屏幕底部且不进入滚动内容，Sheet 内不得出现第二个 homebar，Toast 默认居中且必须 1600ms 默认消失，长文案最多 2200ms，并通过 onClose/清理状态关闭。图标和官方验等品牌标识必须通过 DS 组件/资源解析器加载，禁止页面代码硬写相对 .assets 路径；生成后确认 raw 预览和 OpenDesign 文件预览中资源不空白。链路演示/页面切换/画板导航控件必须放在 IOSDevice 外，不得混入真实手机界面。审查时同时检查左侧对话过程、右侧渲染结果和项目文件。不得手写仿制。"
